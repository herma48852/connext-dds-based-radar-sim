<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 940" font-family="Helvetica, Arial, sans-serif">

  <!-- background -->
  <rect x="0" y="0" width="1480" height="940" fill="#0a0a0f"/>

  <!-- title -->
  <text x="740" y="46" text-anchor="middle" font-size="23" font-weight="bold" fill="#e8f2ea">AesaRadarSim &#8212; DDS Topic Flow</text>

  <!-- legend -->
  <rect x="40" y="800" width="400" height="62" rx="6" fill="#0e1118" stroke="#3a4350"/>
  <!-- legend arrows -->
  <polygon points="100,820 90,815 90,825" fill="#46d17c"/>
  <line x1="56" y1="820" x2="91" y2="820" stroke="#46d17c" stroke-width="2.4"/>
  <text x="110" y="824" font-size="11" fill="#c9d8ce">publishes (writes topic)</text>
  <polygon points="100,844 90,839 90,849" fill="#4fc3f7"/>
  <line x1="56" y1="844" x2="91" y2="844" stroke="#4fc3f7" stroke-width="2.4"/>
  <text x="110" y="848" font-size="11" fill="#c9d8ce">subscribes (reads topic)</text>

  <!-- ============================ TOP ROW ============================ -->

  <!-- Radar.ShipINS -->
  <rect x="40" y="110" width="190" height="68" rx="7" fill="#10141c" stroke="#3a4350"/>
  <text x="135" y="140" text-anchor="middle" font-size="13" font-weight="bold" fill="#dfe9e2">Radar.ShipINS</text>
  <text x="135" y="159" text-anchor="middle" font-size="10" fill="#8fa398">radar_app</text>
  <line x1="135" y1="182" x2="135" y2="420" stroke="#46d17c" stroke-width="2.2"/>
  <polygon points="135,424 130,414 140,414" fill="#46d17c"/>
  <text x="145" y="290" font-size="11" fill="#c9d8ce">Ship/ShipPosition</text>
  <text x="145" y="305" font-size="9.5" fill="#8fa398">10 Hz &#183; key 0 (INS)</text>

  <!-- Radar.BeamScheduler (moved left, closer to ShipINS) -->
  <rect x="280" y="110" width="190" height="68" rx="7" fill="#10141c" stroke="#3a4350"/>
  <text x="375" y="140" text-anchor="middle" font-size="13" font-weight="bold" fill="#dfe9e2">Radar.BeamScheduler</text>
  <text x="375" y="159" text-anchor="middle" font-size="10" fill="#8fa398">radar_app</text>
  <line x1="375" y1="182" x2="375" y2="420" stroke="#46d17c" stroke-width="2.2"/>
  <polygon points="375,424 370,414 380,414" fill="#46d17c"/>
  <text x="385" y="246" font-size="11" fill="#c9d8ce">Radar/BeamCommand</text>
  <text x="385" y="261" font-size="9.5" fill="#8fa398">50 Hz</text>

  <!-- Radar.DetectionProcessor (widened to 520px, arrows well spread) -->
  <rect x="540" y="110" width="520" height="68" rx="7" fill="#10141c" stroke="#3a4350"/>
  <text x="800" y="134" text-anchor="middle" font-size="13" font-weight="bold" fill="#dfe9e2">Radar.Detection</text>
  <text x="800" y="151" text-anchor="middle" font-size="13" font-weight="bold" fill="#dfe9e2">Processor</text>
  <text x="800" y="168" text-anchor="middle" font-size="10" fill="#8fa398">radar_app</text>

  <!-- sub BeamCommand (leftmost) -->
  <line x1="580" y1="424" x2="580" y2="188" stroke="#4fc3f7" stroke-width="2.2"/>
  <polygon points="580,184 575,194 585,194" fill="#4fc3f7"/>
  <text x="570" y="216" text-anchor="end" font-size="11" fill="#c9d8ce">Radar/BeamCommand</text>

  <!-- pub RawReturn -->
  <line x1="660" y1="182" x2="660" y2="420" stroke="#46d17c" stroke-width="2.2"/>
  <polygon points="660,424 655,414 665,414" fill="#46d17c"/>
  <text x="660" y="254" text-anchor="middle" font-size="11" fill="#c9d8ce">Radar/RawReturn</text>
  <text x="660" y="269" text-anchor="middle" font-size="9.5" fill="#8fa398">1 kHz</text>

  <!-- sub RawReturn (loopback) -->
  <line x1="760" y1="424" x2="760" y2="188" stroke="#4fc3f7" stroke-width="2.2"/>
  <polygon points="760,184 755,194 765,194" fill="#4fc3f7"/>
  <text x="760" y="292" text-anchor="middle" font-size="11" fill="#c9d8ce">Radar/RawReturn</text>
  <text x="760" y="307" text-anchor="middle" font-size="9.5" fill="#8fa398">loopback</text>

  <!-- pub DetectionEvent -->
  <line x1="860" y1="182" x2="860" y2="420" stroke="#46d17c" stroke-width="2.2"/>
  <polygon points="860,424 855,414 865,414" fill="#46d17c"/>
  <text x="860" y="330" text-anchor="middle" font-size="11" fill="#c9d8ce">Radar/DetectionEvent</text>

  <!-- sub TargetTruth -->
  <line x1="960" y1="424" x2="960" y2="188" stroke="#4fc3f7" stroke-width="2.2"/>
  <polygon points="960,184 955,194 965,194" fill="#4fc3f7"/>
  <text x="960" y="368" text-anchor="middle" font-size="11" fill="#c9d8ce">TargetGen/TargetTruth</text>

  <!-- sub Ship/ShipPosition key 0 (rightmost) -->
  <line x1="1040" y1="424" x2="1040" y2="188" stroke="#4fc3f7" stroke-width="2.2"/>
  <polygon points="1040,184 1035,194 1045,194" fill="#4fc3f7"/>
  <text x="1040" y="406" text-anchor="middle" font-size="11" fill="#c9d8ce">Ship/ShipPosition</text>
  <text x="1040" y="419" text-anchor="middle" font-size="9.5" fill="#8fa398">key 0 (INS)</text>

  <!-- Radar.TrackManager (widened, arrows spread) -->
  <rect x="1180" y="110" width="260" height="68" rx="7" fill="#10141c" stroke="#3a4350"/>
  <text x="1310" y="140" text-anchor="middle" font-size="13" font-weight="bold" fill="#dfe9e2">Radar.TrackManager</text>
  <text x="1310" y="159" text-anchor="middle" font-size="10" fill="#8fa398">radar_app</text>

  <!-- sub DetectionEvent (left edge) -->
  <line x1="1210" y1="424" x2="1210" y2="188" stroke="#4fc3f7" stroke-width="2.2"/>
  <polygon points="1210,184 1205,194 1215,194" fill="#4fc3f7"/>
  <text x="1200" y="250" text-anchor="end" font-size="11" fill="#c9d8ce">Radar/DetectionEvent</text>

  <!-- pub TargetTrack (center) -->
  <line x1="1310" y1="182" x2="1310" y2="420" stroke="#46d17c" stroke-width="2.2"/>
  <polygon points="1310,424 1305,414 1315,414" fill="#46d17c"/>
  <text x="1320" y="330" text-anchor="start" font-size="11" fill="#c9d8ce">Radar/TargetTrack</text>
  <text x="1320" y="345" text-anchor="start" font-size="9.5" fill="#8fa398">10 Hz</text>

  <!-- sub Ship/ShipPosition key 0 (right edge, label centered) -->
  <line x1="1410" y1="424" x2="1410" y2="188" stroke="#4fc3f7" stroke-width="2.2"/>
  <polygon points="1410,184 1405,194 1415,194" fill="#4fc3f7"/>
  <text x="1410" y="370" text-anchor="middle" font-size="11" fill="#c9d8ce">Ship/ShipPosition</text>
  <text x="1410" y="383" text-anchor="middle" font-size="9.5" fill="#8fa398">key 0 (INS)</text>

  <!-- ============================ THE BUS ============================ -->
  <rect x="40" y="430" width="1400" height="65" rx="9" fill="#12291b" stroke="#2e7d4f" stroke-width="2"/>
  <text x="740" y="459" text-anchor="middle" font-size="17" font-weight="bold" letter-spacing="4" fill="#a9e6c3">DDS DATA BUS</text>
  <text x="740" y="480" text-anchor="middle" font-size="11" fill="#6fae8a">RTI Connext DDS 7.7.0 &#183; Domain 0 &#183; UDPv4 &#183; QoS profiles: qos/radar_qos.xml</text>

  <!-- ============================ BOTTOM ROW ============================ -->

  <!-- Radar.CalibrationMonitor -->
  <rect x="40" y="700" width="190" height="68" rx="7" fill="#10141c" stroke="#3a4350"/>
  <text x="135" y="724" text-anchor="middle" font-size="13" font-weight="bold" fill="#dfe9e2">Radar.Calibration</text>
  <text x="135" y="741" text-anchor="middle" font-size="13" font-weight="bold" fill="#dfe9e2">Monitor</text>
  <text x="135" y="758" text-anchor="middle" font-size="10" fill="#8fa398">radar_app</text>
  <line x1="135" y1="700" x2="135" y2="505" stroke="#46d17c" stroke-width="2.2"/>
  <polygon points="135,501 130,511 140,511" fill="#46d17c"/>
  <text x="145" y="548" font-size="11" fill="#c9d8ce">Radar/CalibrationStatus</text>
  <text x="145" y="563" font-size="9.5" fill="#8fa398">1 Hz</text>

  <!-- Radar.CommandHandler (moved left) -->
  <rect x="280" y="700" width="190" height="68" rx="7" fill="#10141c" stroke="#3a4350"/>
  <text x="375" y="724" text-anchor="middle" font-size="13" font-weight="bold" fill="#dfe9e2">Radar.Command</text>
  <text x="375" y="741" text-anchor="middle" font-size="13" font-weight="bold" fill="#dfe9e2">Handler</text>
  <text x="375" y="758" text-anchor="middle" font-size="10" fill="#8fa398">radar_app &#183; WaitSet</text>
  <line x1="375" y1="505" x2="375" y2="690" stroke="#4fc3f7" stroke-width="2.2"/>
  <polygon points="375,694 370,684 380,684" fill="#4fc3f7"/>
  <text x="365" y="580" text-anchor="end" font-size="11" fill="#c9d8ce">Radar/SystemCommand</text>

  <!-- Radar.CommandConsole (moved left) -->
  <rect x="540" y="700" width="190" height="68" rx="7" fill="#10141c" stroke="#3a4350"/>
  <text x="635" y="724" text-anchor="middle" font-size="13" font-weight="bold" fill="#dfe9e2">Radar.Command</text>
  <text x="635" y="741" text-anchor="middle" font-size="13" font-weight="bold" fill="#dfe9e2">Console</text>
  <text x="635" y="758" text-anchor="middle" font-size="10" fill="#8fa398">radar_app &#183; UI</text>
  <line x1="635" y1="700" x2="635" y2="505" stroke="#46d17c" stroke-width="2.2"/>
  <polygon points="635,501 630,511 640,511" fill="#46d17c"/>
  <text x="625" y="548" text-anchor="end" font-size="11" fill="#c9d8ce">Radar/SystemCommand</text>
  <text x="625" y="563" text-anchor="end" font-size="9.5" fill="#8fa398">UI scenarios</text>

  <!-- HMI-UI (NEW, between CommandConsole and TargetGen) -->
  <rect x="840" y="700" width="280" height="68" rx="7" fill="#10141c" stroke="#3a4350"/>
  <text x="980" y="730" text-anchor="middle" font-size="13" font-weight="bold" fill="#dfe9e2">HMI-UI</text>
  <text x="980" y="749" text-anchor="middle" font-size="10" fill="#8fa398">radar_app &#183; display</text>

  <!-- sub TargetTrack (left edge) -->
  <line x1="870" y1="505" x2="870" y2="690" stroke="#4fc3f7" stroke-width="2.2"/>
  <polygon points="870,694 865,684 875,684" fill="#4fc3f7"/>
  <text x="860" y="548" text-anchor="end" font-size="11" fill="#c9d8ce">Radar/TargetTrack</text>

  <!-- sub DetectionEvent -->
  <line x1="940" y1="505" x2="940" y2="690" stroke="#4fc3f7" stroke-width="2.2"/>
  <polygon points="940,694 935,684 945,684" fill="#4fc3f7"/>
  <text x="930" y="600" text-anchor="end" font-size="11" fill="#c9d8ce">Radar/DetectionEvent</text>

  <!-- sub Ship/ShipPosition -->
  <line x1="1020" y1="505" x2="1020" y2="690" stroke="#4fc3f7" stroke-width="2.2"/>
  <polygon points="1020,694 1015,684 1025,684" fill="#4fc3f7"/>
  <text x="1010" y="650" text-anchor="end" font-size="11" fill="#c9d8ce">Ship/ShipPosition</text>
  <text x="1010" y="663" text-anchor="end" font-size="9.5" fill="#8fa398">key 0 (INS)</text>

  <!-- sub CalibrationStatus (right edge) -->
  <line x1="1090" y1="505" x2="1090" y2="690" stroke="#4fc3f7" stroke-width="2.2"/>
  <polygon points="1090,694 1085,684 1095,684" fill="#4fc3f7"/>
  <text x="1100" y="620" text-anchor="start" font-size="11" fill="#c9d8ce">Radar/CalibrationStatus</text>

  <!-- TargetGen.Generator (widened, arrows spread) -->
  <rect x="1200" y="700" width="260" height="68" rx="7" fill="#10141c" stroke="#3a4350"/>
  <text x="1330" y="730" text-anchor="middle" font-size="13" font-weight="bold" fill="#dfe9e2">TargetGen.Generator</text>
  <text x="1330" y="749" text-anchor="middle" font-size="10" fill="#8fa398">target_gen</text>

  <!-- pub TargetGen/TargetTruth (left, 25% position) -->
  <line x1="1260" y1="700" x2="1260" y2="505" stroke="#46d17c" stroke-width="2.2"/>
  <polygon points="1260,501 1255,511 1265,511" fill="#46d17c"/>
  <text x="1250" y="548" text-anchor="end" font-size="11" fill="#c9d8ce">TargetGen/TargetTruth</text>
  <text x="1250" y="563" text-anchor="end" font-size="9.5" fill="#8fa398">50 Hz &#183; keyed per target</text>

  <!-- pub Ship/ShipPosition key 1 (right, 75% position, label centered) -->
  <line x1="1400" y1="700" x2="1400" y2="505" stroke="#46d17c" stroke-width="2.2"/>
  <polygon points="1400,501 1395,511 1405,511" fill="#46d17c"/>
  <text x="1400" y="620" text-anchor="middle" font-size="11" fill="#c9d8ce">Ship/ShipPosition</text>
  <text x="1400" y="633" text-anchor="middle" font-size="9.5" fill="#8fa398">10 Hz &#183; key 1 (truth)</text>

  <!-- footer -->
  <text x="40" y="916" font-size="10.5" fill="#6f7f76">All application types are @appendable and self-describing via the builtin TypeLookup Service &#8212; monitoring tools decode samples without the IDL file.</text>
</svg>