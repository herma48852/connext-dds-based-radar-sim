<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 940" font-family="Helvetica, Arial, sans-serif">

  <!-- background -->
  <rect x="0" y="0" width="1480" height="940" fill="#0a0a0f"/>

  <!-- title -->
  <text x="740" y="46" text-anchor="middle" font-size="23" font-weight="bold" fill="#e8f2ea">AesaRadarSim &#8212; DDS Topic Flow</text>

  <!-- legend -->
  <rect x="40" y="800" width="400" height="62" rx="6" fill="#0e1118" stroke="#3a4350"/>
  <polygon points="100,820 90,815 90,825" fill="#46d17c"/>
  <line x1="56" y1="820" x2="91" y2="820" stroke="#46d17c" stroke-width="2.4"/>
  <text x="110" y="824" font-size="11" fill="#c9d8ce">publishes (writes topic)</text>
  <polygon points="100,844 90,839 90,849" fill="#4fc3f7"/>
  <line x1="56" y1="844" x2="91" y2="844" stroke="#4fc3f7" stroke-width="2.4"/>
  <text x="110" y="848" font-size="11" fill="#c9d8ce">subscribes (reads topic)</text>

  <!-- ============================ TOP ROW ============================ -->

  <!-- Radar.ShipINS -->
  <rect x="40" y="110" width="190" height="68" rx="7" fill="#10141c" stroke="#3a4350"/>
  <text x="135" y="140" text-anchor="middle" font-size="13" font-weight="bold" fill="#dfe9e2">Radar.ShipINS</text>
  <text x="135" y="159" text-anchor="middle" font-size="10" fill="#8fa398">radar_app</text>
  <line x1="135" y1="182" x2="135" y2="420" stroke="#46d17c" stroke-width="2.2"/>
  <polygon points="135,424 130,414 140,414" fill="#46d17c"/>
  <text x="145" y="290" font-size="11" fill="#c9d8ce">Ship/ShipPosition</text>
  <text x="145" y="305" font-size="9.5" fill="#8fa398">10 Hz &#183; key 0 (INS)</text>

  <!-- Radar.BeamScheduler -->
  <rect x="280" y="110" width="190" height="68" rx="7" fill="#10141c" stroke="#3a4350"/>
  <text x="375" y="140" text-anchor="middle" font-size="13" font-weight="bold" fill="#dfe9e2">Radar.BeamScheduler</text>
  <text x="375" y="159" text-anchor="middle" font-size="10" fill="#8fa398">radar_app</text>
  <line x1="375" y1="182" x2="375" y2="420" stroke="#46d17c" stroke-width="2.2"/>
  <polygon points="375,424 370,414 380,414" fill="#46d17c"/>
  <text x="385" y="246" font-size="11" fill="#c9d8ce">Radar/BeamCommand</text>
  <text x="385" y="261" font-size="9.5" fill="#8fa398">100 Hz</text>

  <!-- Radar.Beamformer: steering + health -> actual beam response -->
  <rect x="500" y="110" width="190" height="68" rx="7" fill="#10141c" stroke="#3a4350"/>
  <text x="595" y="140" text-anchor="middle" font-size="13" font-weight="bold" fill="#dfe9e2">Radar.Beamformer</text>
  <text x="595" y="159" text-anchor="middle" font-size="10" fill="#8fa398">radar_app</text>

  <!-- sub BeamCommand -->
  <line x1="525" y1="424" x2="525" y2="188" stroke="#4fc3f7" stroke-width="2.2"/>
  <polygon points="525,184 520,194 530,194" fill="#4fc3f7"/>
  <text x="535" y="216" font-size="11" fill="#c9d8ce">Radar/BeamCommand</text>

  <!-- sub CalibrationStatus -->
  <line x1="590" y1="424" x2="590" y2="188" stroke="#4fc3f7" stroke-width="2.2"/>
  <polygon points="590,184 585,194 595,194" fill="#4fc3f7"/>
  <text x="580" y="300" text-anchor="end" font-size="11" fill="#c9d8ce">Radar/CalibrationStatus</text>

  <!-- pub BeamPatternStatus -->
  <line x1="660" y1="182" x2="660" y2="420" stroke="#46d17c" stroke-width="3"/>
  <polygon points="660,424 655,414 665,414" fill="#46d17c"/>
  <text x="660" y="382" text-anchor="middle" font-size="11" font-weight="bold" fill="#dff5e7">Radar/BeamPatternStatus</text>
  <text x="660" y="397" text-anchor="middle" font-size="9.5" fill="#8fa398">writer &#183; 20 Hz</text>

  <!-- Radar.DetectionProcessor -->
  <rect x="730" y="110" width="430" height="68" rx="7" fill="#10141c" stroke="#3a4350"/>
  <text x="945" y="134" text-anchor="middle" font-size="13" font-weight="bold" fill="#dfe9e2">Radar.Detection</text>
  <text x="945" y="151" text-anchor="middle" font-size="13" font-weight="bold" fill="#dfe9e2">Processor</text>
  <text x="945" y="168" text-anchor="middle" font-size="10" fill="#8fa398">radar_app</text>

  <!-- sub BeamCommand -->
  <line x1="760" y1="424" x2="760" y2="188" stroke="#4fc3f7" stroke-width="2.2"/>
  <polygon points="760,184 755,194 765,194" fill="#4fc3f7"/>
  <text x="770" y="216" font-size="11" fill="#c9d8ce">Radar/BeamCommand</text>

  <!-- pub RawReturn -->
  <line x1="830" y1="182" x2="830" y2="420" stroke="#46d17c" stroke-width="2.2"/>
  <polygon points="830,424 825,414 835,414" fill="#46d17c"/>
  <text x="830" y="254" text-anchor="middle" font-size="11" fill="#c9d8ce">Radar/RawReturn</text>
  <text x="830" y="269" text-anchor="middle" font-size="9.5" fill="#8fa398">1 kHz</text>

  <!-- sub RawReturn (loopback) -->
  <line x1="900" y1="424" x2="900" y2="188" stroke="#4fc3f7" stroke-width="2.2"/>
  <polygon points="900,184 895,194 905,194" fill="#4fc3f7"/>
  <text x="900" y="292" text-anchor="middle" font-size="11" fill="#c9d8ce">Radar/RawReturn</text>
  <text x="900" y="307" text-anchor="middle" font-size="9.5" fill="#8fa398">loopback</text>

  <!-- pub DetectionEvent -->
  <line x1="970" y1="182" x2="970" y2="420" stroke="#46d17c" stroke-width="2.2"/>
  <polygon points="970,424 965,414 975,414" fill="#46d17c"/>
  <text x="970" y="330" text-anchor="middle" font-size="11" fill="#c9d8ce">Radar/DetectionEvent</text>

  <!-- sub BeamPatternStatus -->
  <line x1="1040" y1="424" x2="1040" y2="188" stroke="#4fc3f7" stroke-width="3"/>
  <polygon points="1040,184 1035,194 1045,194" fill="#4fc3f7"/>
  <text x="1040" y="382" text-anchor="middle" font-size="11" font-weight="bold" fill="#dff5ff">Radar/BeamPatternStatus</text>
  <text x="1040" y="397" text-anchor="middle" font-size="9.5" fill="#8fa398">reader &#183; receiver physics</text>

  <!-- sub TargetTruth -->
  <line x1="1125" y1="424" x2="1125" y2="188" stroke="#4fc3f7" stroke-width="2.2"/>
  <polygon points="1125,184 1120,194 1130,194" fill="#4fc3f7"/>
  <text x="1135" y="350" font-size="11" fill="#c9d8ce">TargetGen/TargetTruth</text>

  <!-- Radar.TrackManager -->
  <rect x="1190" y="110" width="250" height="68" rx="7" fill="#10141c" stroke="#3a4350"/>
  <text x="1315" y="140" text-anchor="middle" font-size="13" font-weight="bold" fill="#dfe9e2">Radar.TrackManager</text>
  <text x="1315" y="159" text-anchor="middle" font-size="10" fill="#8fa398">radar_app</text>

  <!-- sub DetectionEvent -->
  <line x1="1220" y1="424" x2="1220" y2="188" stroke="#4fc3f7" stroke-width="2.2"/>
  <polygon points="1220,184 1215,194 1225,194" fill="#4fc3f7"/>
  <text x="1210" y="250" text-anchor="end" font-size="11" fill="#c9d8ce">Radar/DetectionEvent</text>

  <!-- pub TargetTrack -->
  <line x1="1320" y1="182" x2="1320" y2="420" stroke="#46d17c" stroke-width="2.2"/>
  <polygon points="1320,424 1315,414 1325,414" fill="#46d17c"/>
  <text x="1330" y="330" font-size="11" fill="#c9d8ce">Radar/TargetTrack</text>
  <text x="1330" y="345" font-size="9.5" fill="#8fa398">10 Hz</text>

  <!-- ============================ THE BUS ============================ -->
  <rect x="40" y="430" width="1400" height="65" rx="9" fill="#12291b" stroke="#2e7d4f" stroke-width="2"/>
  <text x="740" y="459" text-anchor="middle" font-size="17" font-weight="bold" letter-spacing="4" fill="#a9e6c3">DDS DATA BUS</text>
  <text x="740" y="480" text-anchor="middle" font-size="11" fill="#6fae8a">RTI Connext DDS 7.7.0 &#183; Domain 0 &#183; UDPv4 &#183; QoS profiles: qos/radar_qos.xml</text>

  <!-- ============================ BOTTOM ROW ============================ -->

  <!-- Radar.CalibrationMonitor -->
  <rect x="40" y="700" width="190" height="68" rx="7" fill="#10141c" stroke="#3a4350"/>
  <text x="135" y="724" text-anchor="middle" font-size="13" font-weight="bold" fill="#dfe9e2">Radar.Calibration</text>
  <text x="135" y="741" text-anchor="middle" font-size="13" font-weight="bold" fill="#dfe9e2">Monitor</text>
  <text x="135" y="758" text-anchor="middle" font-size="10" fill="#8fa398">radar_app</text>
  <line x1="135" y1="700" x2="135" y2="505" stroke="#46d17c" stroke-width="2.2"/>
  <polygon points="135,501 130,511 140,511" fill="#46d17c"/>
  <text x="145" y="548" font-size="11" fill="#c9d8ce">Radar/CalibrationStatus</text>
  <text x="145" y="563" font-size="9.5" fill="#8fa398">1 Hz + state changes</text>

  <!-- Radar.CommandHandler -->
  <rect x="280" y="700" width="190" height="68" rx="7" fill="#10141c" stroke="#3a4350"/>
  <text x="375" y="724" text-anchor="middle" font-size="13" font-weight="bold" fill="#dfe9e2">Radar.Command</text>
  <text x="375" y="741" text-anchor="middle" font-size="13" font-weight="bold" fill="#dfe9e2">Handler</text>
  <text x="375" y="758" text-anchor="middle" font-size="10" fill="#8fa398">radar_app &#183; WaitSet</text>
  <line x1="375" y1="505" x2="375" y2="690" stroke="#4fc3f7" stroke-width="2.2"/>
  <polygon points="375,694 370,684 380,684" fill="#4fc3f7"/>
  <text x="365" y="580" text-anchor="end" font-size="11" fill="#c9d8ce">Radar/SystemCommand</text>

  <!-- Radar.CommandConsole -->
  <rect x="540" y="700" width="190" height="68" rx="7" fill="#10141c" stroke="#3a4350"/>
  <text x="635" y="724" text-anchor="middle" font-size="13" font-weight="bold" fill="#dfe9e2">Radar.Command</text>
  <text x="635" y="741" text-anchor="middle" font-size="13" font-weight="bold" fill="#dfe9e2">Console</text>
  <text x="635" y="758" text-anchor="middle" font-size="10" fill="#8fa398">radar_app &#183; UI</text>
  <line x1="635" y1="700" x2="635" y2="505" stroke="#46d17c" stroke-width="2.2"/>
  <polygon points="635,501 630,511 640,511" fill="#46d17c"/>
  <text x="625" y="548" text-anchor="end" font-size="11" fill="#c9d8ce">Radar/SystemCommand</text>
  <text x="625" y="563" text-anchor="end" font-size="9.5" fill="#8fa398">UI scenarios</text>

  <!-- Radar.HMI-UI (display endpoint: every panel is DDS-fed) -->
  <rect x="820" y="700" width="280" height="68" rx="7" fill="#10141c" stroke="#3a4350"/>
  <text x="960" y="730" text-anchor="middle" font-size="13" font-weight="bold" fill="#dfe9e2">Radar.HMI-UI</text>
  <text x="960" y="749" text-anchor="middle" font-size="10" fill="#8fa398">radar_app &#183; display</text>

  <!-- sub TargetTrack -->
  <line x1="850" y1="505" x2="850" y2="690" stroke="#4fc3f7" stroke-width="2.2"/>
  <polygon points="850,694 845,684 855,684" fill="#4fc3f7"/>
  <text x="850" y="540" text-anchor="middle" font-size="11" fill="#c9d8ce">Radar/TargetTrack</text>

  <!-- sub DetectionEvent -->
  <line x1="920" y1="505" x2="920" y2="690" stroke="#4fc3f7" stroke-width="2.2"/>
  <polygon points="920,694 915,684 925,684" fill="#4fc3f7"/>
  <text x="920" y="585" text-anchor="middle" font-size="11" fill="#c9d8ce">Radar/DetectionEvent</text>

  <!-- sub Ship/ShipPosition -->
  <line x1="990" y1="505" x2="990" y2="690" stroke="#4fc3f7" stroke-width="2.2"/>
  <polygon points="990,694 985,684 995,684" fill="#4fc3f7"/>
  <text x="990" y="630" text-anchor="middle" font-size="11" fill="#c9d8ce">Ship/ShipPosition</text>
  <text x="990" y="643" text-anchor="middle" font-size="9.5" fill="#8fa398">key 0 (INS)</text>

  <!-- sub CalibrationStatus -->
  <line x1="1090" y1="505" x2="1090" y2="690" stroke="#4fc3f7" stroke-width="2.2"/>
  <polygon points="1090,694 1085,684 1095,684" fill="#4fc3f7"/>
  <text x="1090" y="675" text-anchor="middle" font-size="11" fill="#c9d8ce">Radar/CalibrationStatus</text>

  <!-- sub BeamPatternStatus -->
  <line x1="1040" y1="505" x2="1040" y2="690" stroke="#4fc3f7" stroke-width="3"/>
  <polygon points="1040,694 1035,684 1045,684" fill="#4fc3f7"/>
  <text x="1052" y="520" font-size="11" font-weight="bold" fill="#dff5ff">Radar/BeamPatternStatus</text>
  <text x="1052" y="535" font-size="9.5" fill="#8fa398">reader &#183; Radar.HMI-UI</text>

  <!-- TargetGen.Generator (flush with bus right edge) -->
  <rect x="1160" y="700" width="280" height="68" rx="7" fill="#10141c" stroke="#3a4350"/>
  <text x="1300" y="730" text-anchor="middle" font-size="13" font-weight="bold" fill="#dfe9e2">TargetGen.Generator</text>
  <text x="1300" y="749" text-anchor="middle" font-size="10" fill="#8fa398">target_gen</text>

  <!-- pub TargetGen/TargetTruth -->
  <line x1="1230" y1="700" x2="1230" y2="505" stroke="#46d17c" stroke-width="2.2"/>
  <polygon points="1230,501 1225,511 1235,511" fill="#46d17c"/>
  <text x="1220" y="548" text-anchor="end" font-size="11" fill="#c9d8ce">TargetGen/TargetTruth</text>
  <text x="1220" y="563" text-anchor="end" font-size="9.5" fill="#8fa398">50 Hz &#183; keyed per target</text>

  <!-- pub Ship/ShipPosition key 1 -->
  <line x1="1370" y1="700" x2="1370" y2="505" stroke="#46d17c" stroke-width="2.2"/>
  <polygon points="1370,501 1365,511 1375,511" fill="#46d17c"/>
  <text x="1370" y="620" text-anchor="middle" font-size="11" fill="#c9d8ce">Ship/ShipPosition</text>
  <text x="1370" y="633" text-anchor="middle" font-size="9.5" fill="#8fa398">10 Hz &#183; key 1 (truth)</text>

  <!-- footer -->
  <text x="40" y="916" font-size="10.5" fill="#6f7f76">All application types are @appendable and self-describing via the builtin TypeLookup Service &#8212; monitoring tools decode samples without the IDL file.</text>
</svg>
