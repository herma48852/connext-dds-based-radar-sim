<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 940" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="pubArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#46d17c"/>
    </marker>
    <marker id="subArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4fc3f7"/>
    </marker>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1480" height="940" fill="#0a0a0f"/>

  <!-- title -->
  <text x="740" y="46" text-anchor="middle" font-size="23" font-weight="bold" fill="#e8f2ea">AesaRadarSim &#8212; DDS Topic Flow</text>

  <!-- legend -->
  <rect x="40" y="800" width="400" height="62" rx="6" fill="#0e1118" stroke="#3a4350"/>
  <line x1="56" y1="820" x2="100" y2="820" stroke="#46d17c" stroke-width="2.4" marker-end="url(#pubArrow)"/>
  <text x="110" y="824" font-size="11" fill="#c9d8ce">publishes (writes topic)</text>
  <line x1="56" y1="844" x2="100" y2="844" stroke="#4fc3f7" stroke-width="2.4" marker-end="url(#subArrow)"/>
  <text x="110" y="848" font-size="11" fill="#c9d8ce">subscribes (reads topic)</text>

  <!-- ============================ TOP ROW ============================ -->

  <!-- Radar.ShipINS -->
  <rect x="40" y="110" width="190" height="68" rx="7" fill="#10141c" stroke="#3a4350"/>
  <text x="135" y="140" text-anchor="middle" font-size="13" font-weight="bold" fill="#dfe9e2">Radar.ShipINS</text>
  <text x="135" y="159" text-anchor="middle" font-size="10" fill="#8fa398">radar_app</text>
  <line x1="135" y1="182" x2="135" y2="424" stroke="#46d17c" stroke-width="2.2" marker-end="url(#pubArrow)"/>
  <text x="145" y="290" font-size="11" fill="#c9d8ce">Ship/ShipPosition</text>
  <text x="145" y="305" font-size="9.5" fill="#8fa398">10 Hz &#183; key 0 (INS)</text>

  <!-- Radar.BeamScheduler (moved left, closer to ShipINS) -->
  <rect x="280" y="110" width="190" height="68" rx="7" fill="#10141c" stroke="#3a4350"/>
  <text x="375" y="140" text-anchor="middle" font-size="13" font-weight="bold" fill="#dfe9e2">Radar.BeamScheduler</text>
  <text x="375" y="159" text-anchor="middle" font-size="10" fill="#8fa398">radar_app</text>
  <line x1="375" y1="182" x2="375" y2="424" stroke="#46d17c" stroke-width="2.2" marker-end="url(#pubArrow)"/>
  <text x="385" y="246" font-size="11" fill="#c9d8ce">Radar/BeamCommand</text>
  <text x="385" y="261" font-size="9.5" fill="#8fa398">50 Hz</text>

  <!-- Radar.DetectionProcessor (widened to 520px, arrows well spread) -->
  <rect x="540" y="110" width="520" height="68" rx="7" fill="#10141c" stroke="#3a4350"/>
  <text x="800" y="134" text-anchor="middle" font-size="13" font-weight="bold" fill="#dfe9e2">Radar.Detection</text>
  <text x="800" y="151" text-anchor="middle" font-size="13" font-weight="bold" fill="#dfe9e2">Processor</text>
  <text x="800" y="168" text-anchor="middle" font-size="10" fill="#8fa398">radar_app</text>

  <!-- sub BeamCommand (leftmost) -->
  <line x1="580" y1="424" x2="580" y2="184" stroke="#4fc3f7" stroke-width="2.2" marker-end="url(#subArrow)"/>
  <text x="570" y="216" text-anchor="end" font-size="11" fill="#c9d8ce">Radar/BeamCommand</text>

  <!-- pub RawReturn -->
  <line x1="640" y1="182" x2="640" y2="424" stroke="#46d17c" stroke-width="2.2" marker-end="url(#pubArrow)"/>
  <text x="630" y="254" text-anchor="end" font-size="11" fill="#c9d8ce">Radar/RawReturn</text>
  <text x="630" y="269" text-anchor="end" font-size="9.5" fill="#8fa398">1 kHz</text>

  <!-- sub RawReturn (loopback) -->
  <line x1="720" y1="424" x2="720" y2="184" stroke="#4fc3f7" stroke-width="2.2" marker-end="url(#subArrow)"/>
  <text x="730" y="292" font-size="11" fill="#c9d8ce">Radar/RawReturn</text>
  <text x="730" y="307" font-size="9.5" fill="#8fa398">loopback</text>

  <!-- pub DetectionEvent -->
  <line x1="820" y1="182" x2="820" y2="424" stroke="#46d17c" stroke-width="2.2" marker-end="url(#pubArrow)"/>
  <text x="830" y="330" font-size="11" fill="#c9d8ce">Radar/DetectionEvent</text>

  <!-- sub TargetTruth -->
  <line x1="920" y1="424" x2="920" y2="184" stroke="#4fc3f7" stroke-width="2.2" marker-end="url(#subArrow)"/>
  <text x="930" y="368" font-size="11" fill="#c9d8ce">TargetGen/TargetTruth</text>

  <!-- sub Ship/ShipPosition key 0 (rightmost) -->
  <line x1="1000" y1="424" x2="1000" y2="184" stroke="#4fc3f7" stroke-width="2.2" marker-end="url(#subArrow)"/>
  <text x="1010" y="406" font-size="11" fill="#c9d8ce">Ship/ShipPosition</text>
  <text x="1010" y="419" font-size="9.5" fill="#8fa398">key 0 (INS)</text>

  <!-- Radar.TrackManager (widened, arrows spread) -->
  <rect x="1180" y="110" width="260" height="68" rx="7" fill="#10141c" stroke="#3a4350"/>
  <text x="1310" y="140" text-anchor="middle" font-size="13" font-weight="bold" fill="#dfe9e2">Radar.TrackManager</text>
  <text x="1310" y="159" text-anchor="middle" font-size="10" fill="#8fa398">radar_app</text>

  <!-- sub DetectionEvent (left edge) -->
  <line x1="1210" y1="424" x2="1210" y2="184" stroke="#4fc3f7" stroke-width="2.2" marker-end="url(#subArrow)"/>
  <text x="1200" y="250" text-anchor="end" font-size="11" fill="#c9d8ce">Radar/DetectionEvent</text>

  <!-- pub TargetTrack (center) -->
  <line x1="1310" y1="182" x2="1310" y2="424" stroke="#46d17c" stroke-width="2.2" marker-end="url(#pubArrow)"/>
  <text x="1320" y="330" text-anchor="start" font-size="11" fill="#c9d8ce">Radar/TargetTrack</text>
  <text x="1320" y="345" text-anchor="start" font-size="9.5" fill="#8fa398">10 Hz</text>

  <!-- sub Ship/ShipPosition key 0 (right edge) -->
  <line x1="1410" y1="424" x2="1410" y2="184" stroke="#4fc3f7" stroke-width="2.2" marker-end="url(#subArrow)"/>
  <text x="1420" y="370" text-anchor="start" font-size="11" fill="#c9d8ce">Ship/ShipPosition</text>
  <text x="1420" y="383" text-anchor="start" font-size="9.5" fill="#8fa398">key 0 (INS)</text>

  <!-- ============================ THE BUS ============================ -->
  <rect x="40" y="430" width="1400" height="65" rx="9" fill="#12291b" stroke="#2e7d4f" stroke-width="2"/>
  <text x="740" y="459" text-anchor="middle" font-size="17" font-weight="bold" letter-spacing="4" fill="#a9e6c3">DDS DATA BUS</text>
  <text x="740" y="480" text-anchor="middle" font-size="11" fill="#6fae8a">RTI Connext DDS 7.7.0 &#183; Domain 0 &#183; UDPv4 &#183; QoS profiles: qos/radar_qos.xml</text>

  <!-- ============================ BOTTOM ROW ============================ -->

  <!-- Radar.CalibrationMonitor -->
  <rect x="40" y="700" width="190" height="68" rx="7" fill="#10141c" stroke="#3a4350"/>
  <text x="135" y="724" text-anchor="middle" font-size="13" font-weight="bold" fill="#dfe9e2">Radar.Calibration</text>
  <text x="135" y="741" text-anchor="middle" font-size="13" font-weight="bold" fill="#dfe9e2">Monitor</text>
  <text x="135" y="758" text-anchor="middle" font-size="10" fill="#8fa398">radar_app</text>
  <line x1="135" y1="700" x2="135" y2="501" stroke="#46d17c" stroke-width="2.2" marker-end="url(#pubArrow)"/>
  <text x="145" y="548" font-size="11" fill="#c9d8ce">Radar/CalibrationStatus</text>
  <text x="145" y="563" font-size="9.5" fill="#8fa398">1 Hz</text>

  <!-- Radar.CommandHandler -->
  <rect x="443" y="700" width="190" height="68" rx="7" fill="#10141c" stroke="#3a4350"/>
  <text x="538" y="724" text-anchor="middle" font-size="13" font-weight="bold" fill="#dfe9e2">Radar.Command</text>
  <text x="538" y="741" text-anchor="middle" font-size="13" font-weight="bold" fill="#dfe9e2">Handler</text>
  <text x="538" y="758" text-anchor="middle" font-size="10" fill="#8fa398">radar_app &#183; WaitSet</text>
  <line x1="538" y1="501" x2="538" y2="694" stroke="#4fc3f7" stroke-width="2.2" marker-end="url(#subArrow)"/>
  <text x="528" y="548" text-anchor="end" font-size="11" fill="#c9d8ce">Radar/SystemCommand</text>

  <!-- Radar.CommandConsole -->
  <rect x="846" y="700" width="190" height="68" rx="7" fill="#10141c" stroke="#3a4350"/>
  <text x="941" y="724" text-anchor="middle" font-size="13" font-weight="bold" fill="#dfe9e2">Radar.Command</text>
  <text x="941" y="741" text-anchor="middle" font-size="13" font-weight="bold" fill="#dfe9e2">Console</text>
  <text x="941" y="758" text-anchor="middle" font-size="10" fill="#8fa398">radar_app &#183; UI</text>
  <line x1="941" y1="700" x2="941" y2="501" stroke="#46d17c" stroke-width="2.2" marker-end="url(#pubArrow)"/>
  <text x="931" y="548" text-anchor="end" font-size="11" fill="#c9d8ce">Radar/SystemCommand</text>
  <text x="931" y="563" text-anchor="end" font-size="9.5" fill="#8fa398">UI scenarios</text>

  <!-- TargetGen.Generator -->
  <rect x="1249" y="700" width="190" height="68" rx="7" fill="#10141c" stroke="#3a4350"/>
  <text x="1344" y="730" text-anchor="middle" font-size="13" font-weight="bold" fill="#dfe9e2">TargetGen.Generator</text>
  <text x="1344" y="749" text-anchor="middle" font-size="10" fill="#8fa398">target_gen</text>
  <line x1="1335" y1="700" x2="1335" y2="501" stroke="#46d17c" stroke-width="2.2" marker-end="url(#pubArrow)"/>
  <text x="1325" y="548" text-anchor="end" font-size="11" fill="#c9d8ce">TargetGen/TargetTruth</text>
  <text x="1325" y="563" text-anchor="end" font-size="9.5" fill="#8fa398">50 Hz &#183; keyed per target</text>
  <line x1="1353" y1="700" x2="1353" y2="501" stroke="#46d17c" stroke-width="2.2" marker-end="url(#pubArrow)"/>
  <text x="1363" y="616" text-anchor="start" font-size="11" fill="#c9d8ce">Ship/ShipPosition</text>
  <text x="1363" y="631" text-anchor="start" font-size="9.5" fill="#8fa398">10 Hz &#183; key 1 (truth)</text>

  <!-- footer -->
  <text x="40" y="916" font-size="10.5" fill="#6f7f76">All application types are @appendable and self-describing via the builtin TypeLookup Service &#8212; monitoring tools decode samples without the IDL file.</text>
</svg>